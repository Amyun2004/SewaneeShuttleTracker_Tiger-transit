{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <!-- Page Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Shuttle Schedule</h1>
        <p class="text-gray-400 text-sm mt-1">Select your stop to see departure times</p>
    </div>

    <!-- Controls Row -->
    <div class="flex flex-col sm:flex-row gap-4 mb-8">

        <!-- Stop Selector -->
        <div class="flex-grow">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Your Stop</label>
            <select id="stopSelect"
                class="w-full border border-gray-200 bg-white rounded-xl px-4 py-3 text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#582C83]/30 focus:border-[#582C83] transition cursor-pointer shadow-sm">
                <option value="all">All Stops (Full Table)</option>
                <option value="0">TWC – Parking</option>
                <option value="1">Gorgas / Quintard</option>
                <option value="2">Classics House-ish</option>
                <option value="3">Hodgson Hill</option>
                <option value="4">Biehl Commons</option>
                <option value="5">Fowler</option>
                <option value="6">French House</option>
                <option value="7">Woodlands</option>
                <option value="8">Crafting Guild / Fine Arts</option>
                <option value="9">Tennis Courts</option>
                <option value="10">Zone C Parking Lot</option>
                <option value="11">Trexant</option>
                <option value="12">Humphreys</option>
                <option value="13">The BC</option>
                <option value="14">Wellness Commons</option>
                <option value="15">Village – near Regions Bank</option>
            </select>
        </div>

        <!-- Day Toggle -->
        <div class="sm:w-64">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Schedule</label>
            <div class="flex rounded-xl border border-gray-200 bg-white overflow-hidden shadow-sm">
                <button id="btn-daily" onclick="switchSchedule('daily')"
                    class="flex-1 py-3 text-sm font-semibold transition-all bg-[#582C83] text-white">
                    Mon – Fri
                </button>
                <button id="btn-night" onclick="switchSchedule('night')"
                    class="flex-1 py-3 text-sm font-semibold transition-all text-gray-500 hover:text-gray-800">
                    Fri + Sat Night
                </button>
            </div>
        </div>
    </div>

    <!-- Next Departure Banner -->
    <div id="nextBanner" class="mb-6 bg-[#582C83] text-white rounded-2xl px-6 py-4 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🚌</span>
            <div>
                <p class="text-white/60 text-xs font-semibold uppercase tracking-wider">Next Departure from</p>
                <p id="bannerStop" class="font-bold text-base">your selected stop</p>
            </div>
        </div>
        <div class="text-right">
            <p id="bannerTime" class="text-3xl font-black font-mono text-[#C8A051]">—</p>
            <p id="bannerCountdown" class="text-white/50 text-xs mt-0.5">select a stop above</p>
        </div>
    </div>

    <!-- Schedule Table Card -->
    <div class="bg-white border border-gray-200 rounded-[24px] overflow-hidden shadow-sm">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span id="scheduleLabel" class="text-sm font-bold text-gray-900">Mon – Fri Daily Schedule</span>
                <span id="scheduleRange" class="px-2 py-0.5 bg-[#582C83]/10 text-[#582C83] text-xs font-bold rounded-full">7:18 AM – 8:23 PM</span>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table id="scheduleTable" class="w-full text-xs sm:text-sm border-collapse">
                <thead>
                    <tr id="headerRow" class="bg-gray-50 border-b border-gray-200"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Legend -->
    <div class="mt-4 flex flex-wrap items-center gap-4 text-xs text-gray-400">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-sm bg-[#C8A051]"></div>
            <span>Next departure</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-sm bg-[#582C83]/10 border border-[#582C83]/20"></div>
            <span>Shuttle rest</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-sm bg-green-100 border border-green-200"></div>
            <span>Upcoming (within 60 min)</span>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/schedule.js') }}"></script>
{% endblock %}
