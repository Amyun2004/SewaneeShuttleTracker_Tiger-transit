{% extends 'base.html' %}

{% block content %}

<!-- Leaflet CSS — the free open-source map library -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="flex flex-col lg:flex-row w-full" style="min-height: calc(100vh - 64px);">

    <!-- LEFT SIDEBAR -->
    <div class="w-full lg:w-96 bg-white border-r border-gray-200 shadow-xl z-20 flex flex-col h-full shrink-0">

        <div class="p-6 border-b border-gray-100 bg-[#582C83]">
            <a href="{{ url_for('index') }}" class="inline-flex items-center gap-1.5 text-white/60 hover:text-white text-sm font-medium mb-5 transition">
                ← Dashboard
            </a>

            <div class="flex items-start justify-between">
                <div>
                    <p class="text-white/60 text-xs font-semibold uppercase tracking-widest mb-1">Your Location</p>
                    <h2 class="text-2xl font-bold text-white leading-tight" id="locationName">Locating...</h2>
                    <p class="text-white/50 text-xs mt-1" id="coordsDisplay">Waiting for GPS</p>
                </div>
                <div class="text-right">
                    <p class="text-4xl font-black text-[#C8A051] font-mono leading-none" id="accuracyDisplay">—</p>
                    <p class="text-white/60 text-xs font-semibold uppercase">meters</p>
                </div>
            </div>

            <div class="mt-4 flex items-center gap-3">
                <!-- GPS status badge — changes color based on signal -->
                <span id="gpsBadge" class="px-3 py-1 bg-yellow-500/20 border border-yellow-400/30 text-yellow-300 font-bold text-xs rounded-full uppercase tracking-wide">
                    ⌛ Acquiring GPS
                </span>
                <span class="text-white/50 text-xs" id="lastUpdate">—</span>
            </div>
        </div>

        <!-- Upcoming Route (static for now, connect to backend later) -->
        <div class="p-6 overflow-y-auto flex-grow">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-5">Upcoming Route</p>

            <div class="relative border-l-2 border-gray-200 ml-5 space-y-8">

                <div class="relative pl-7">
                    <div class="absolute -left-[11px] top-0.5 w-5 h-5 rounded-full bg-[#C8A051] border-4 border-white shadow-md ring-2 ring-[#C8A051]/30"></div>
                    <div class="bg-[#582C83]/5 border border-[#582C83]/10 rounded-xl p-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold text-gray-900 text-sm">McClurg Dining Hall</p>
                                <p class="text-xs text-[#582C83] font-semibold mt-0.5">Arriving shortly</p>
                            </div>
                            <span class="text-[#582C83] font-black font-mono text-sm">3m</span>
                        </div>
                    </div>
                </div>

                <div class="relative pl-7 opacity-70">
                    <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-gray-300 border-2 border-white"></div>
                    <div class="rounded-xl p-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-semibold text-gray-700 text-sm">The SPO / Bookstore</p>
                                <p class="text-xs text-gray-400 mt-0.5">Main route stop</p>
                            </div>
                            <span class="text-gray-400 font-bold font-mono text-sm">6m</span>
                        </div>
                    </div>
                </div>

                <div class="relative pl-7 opacity-50">
                    <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-gray-200 border-2 border-white"></div>
                    <div class="rounded-xl p-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-semibold text-gray-600 text-sm">Fowler Center</p>
                                <p class="text-xs text-gray-400 mt-0.5">Recreation</p>
                            </div>
                            <span class="text-gray-400 font-bold font-mono text-sm">10m</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Bottom Actions -->
        <div class="p-4 border-t border-gray-100 bg-gray-50 grid grid-cols-2 gap-3">
            <button onclick="centerOnMe()" class="flex items-center justify-center gap-2 py-2.5 rounded-xl bg-[#582C83] text-white text-sm font-semibold hover:bg-[#6d35a0] transition">
                🎯 Center Me
            </button>
            <button class="flex items-center justify-center gap-2 py-2.5 rounded-xl bg-white border border-gray-200 text-gray-700 text-sm font-semibold hover:bg-gray-100 transition">
                ⚠️ Report
            </button>
        </div>

    </div>

    <!-- RIGHT SIDE — REAL MAP -->
    <!-- 
        id="map" is what Leaflet targets to inject the map into.
        The div just needs a defined height — flex-grow handles that here.
    -->
    <div id="map" class="flex-grow z-10" style="min-height: 60vh;"></div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="{{ url_for('static', filename='js/view.js') }}"></script>
{% endblock %}
