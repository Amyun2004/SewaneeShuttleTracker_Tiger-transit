<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewanee Transit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-[#F4F1F8] font-sans text-gray-900 flex flex-col min-h-screen">

    <!-- Navigation -->
    <header class="w-full bg-[#582C83] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            
            <!-- Logo -->
            <a href="{{ url_for('index') }}" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#C8A051] rounded-lg flex items-center justify-center text-white font-bold text-sm">ST</div>
                <span class="text-white font-semibold text-lg tracking-tight">Sewanee <span class="text-[#C8A051]">Transit</span></span>
            </a>

            <!-- Nav Links (desktop) -->
            <nav class="hidden md:flex items-center gap-1">
                <a href="{{ url_for('index') }}" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-white/70 hover:text-white hover:bg-white/10 transition-all">Home</a>
                <a href="{{ url_for('view_map') }}" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-white/70 hover:text-white hover:bg-white/10 transition-all">Live Map</a>
                <a href="#" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-white/70 hover:text-white hover:bg-white/10 transition-all">Schedule</a>
                <a href="{{ url_for('schedule') }}" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-white/70 hover:text-white hover:bg-white/10 transition-all">Schedule</a>
            </nav>

            <!-- Right Side Actions -->
            <div class="flex items-center gap-2">
                <!-- Live indicator -->
                <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-white/10 rounded-full">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                    <span class="text-xs text-white/80 font-medium font-mono">2 routes live</span>
                </div>
                <!-- Bell -->
                <button class="w-9 h-9 bg-white/10 rounded-lg flex items-center justify-center hover:bg-white/20 transition text-base">🔔</button>
                <!-- User Avatar Placeholder -->
                <button class="w-9 h-9 bg-[#C8A051] rounded-lg flex items-center justify-center hover:opacity-90 transition font-bold text-white text-sm">A</button>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="w-full bg-[#582C83] text-white/60 text-xs py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-2">
            <span>© 2025 Sewanee Transit · University of the South</span>
            <div class="flex gap-4">
                <a href="#" class="hover:text-white transition">Privacy</a>
                <a href="#" class="hover:text-white transition">Contact SPO</a>
                <a href="#" class="hover:text-white transition">Admin</a>
            </div>
        </div>
    </footer>

</body>
</html>
